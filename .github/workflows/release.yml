name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  RELEASE_DMG_NAME: claude-code-usage-monitor.dmg

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release

      - name: Build DMG
        run: bash scripts/package-macos.sh target/release/claude-code-usage-monitor dist/${{ env.RELEASE_DMG_NAME }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ env.RELEASE_DMG_NAME }}
          generate_release_notes: true
